<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAC QR Check-in</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617;
        }

        .hidden { display: none !important; }
        
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Checkbox */
        .custom-checkbox {
            appearance: none;
            background-color: #1e293b;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.75em;
            height: 1.75em;
            border: 2px solid #334155;
            border-radius: 0.5em;
            display: grid;
            place-content: center;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .custom-checkbox::before {
            content: "";
            width: 1em;
            height: 1em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
            background-color: white;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .custom-checkbox:checked {
            background-color: #3b82f6;
            border-color: #3b82f6;
        }

        .custom-checkbox:checked::before {
            transform: scale(1);
        }

        /* Success Animation */
        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: block;
            stroke-width: 2;
            stroke: #22c55e;
            stroke-miterlimit: 10;
            box-shadow: inset 0px 0px 0px #22c55e;
            animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
            margin: 0 auto;
        }
        .checkmark__circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 2;
            stroke-miterlimit: 10;
            stroke: #22c55e;
            fill: none;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }
        .checkmark__check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
        }
        @keyframes stroke { 100% { stroke-dashoffset: 0; } }
        @keyframes scale { 0%, 100% { transform: none; } 50% { transform: scale3d(1.1, 1.1, 1); } }
        @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 30px #22c55e00; } }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center p-4 selection:bg-blue-500/30">

    <div class="w-full max-w-md bg-slate-900 rounded-3xl shadow-2xl overflow-hidden border border-slate-800 relative">
        <!-- Top accent -->
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-blue-600 via-indigo-500 to-blue-600"></div>

        <div class="p-8">
            <!-- Header & Time -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600/10 rounded-2xl mb-4 border border-blue-500/20">
                    <i class="fa-solid fa-qrcode text-3xl text-blue-500"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-white tracking-tight">OAC Check-in</h1>
                
                <!-- Time Display -->
                <div class="mt-4">
                    <div id="current-time" class="text-5xl font-black text-blue-400 tracking-tighter">--:--:--</div>
                    <div id="current-date" class="text-slate-400 mt-2 text-sm font-bold uppercase tracking-widest">---</div>
                </div>
            </div>

            <!-- Network Status -->
            <div id="ip-status-banner" class="mb-6 p-4 rounded-2xl flex items-center gap-3 text-xs font-semibold bg-slate-800/50 border border-slate-700 transition-all duration-300">
                <div id="ip-indicator" class="w-2 h-2 rounded-full bg-slate-500 animate-pulse"></div>
                <span id="ip-text" class="text-slate-400">Verifying network connection...</span>
            </div>

            <!-- Cooldown View -->
            <div id="cooldown-view" class="hidden text-center py-6 fade-in bg-blue-500/10 border border-blue-500/20 rounded-2xl">
                <i class="fa-solid fa-clock text-4xl text-blue-400 mb-4"></i>
                <h3 class="text-lg font-bold text-white mb-2">Bạn đã check-in rồi!</h3>
                <p class="text-blue-200/80 text-sm px-4">Hẹn gặp lại sau 12h nhé.</p>
                <p id="cooldown-timer" class="text-xs text-blue-400 mt-4 font-mono"></p>
            </div>

            <!-- Main Form View -->
            <div id="form-view" class="space-y-6 fade-in">
                <!-- Name Selection -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Select Your Name</label>
                    <div class="relative">
                        <select
                            id="nameSelect"
                            class="w-full bg-slate-800 border border-slate-700 text-white px-5 py-4 rounded-2xl focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none transition-all appearance-none font-bold text-lg cursor-pointer"
                        >
                            <option value="" disabled selected>Tap to select...</option>
                            <option value="Coby">Coby</option>
                            <option value="Lauren">Lauren</option>
                            <option value="Ellie">Ellie</option>
                            <option value="Matthew">Matthew</option>
                            <option value="Lucy">Lucy</option>
                            <option value="Chloe">Chloe</option>
                            <option value="Tyler">Tyler</option>
                            <option value="Tess">Tess</option>
                            <option value="Tracy">Tracy</option>
                            <option value="Cindi">Cindi</option>
                            <option value="Daisy">Daisy</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none"></i>
                    </div>
                </div>

                <!-- Checkbox -->
                <label class="flex items-center gap-4 p-5 rounded-2xl border border-slate-700 bg-slate-800/50 cursor-pointer hover:bg-slate-800 transition-colors group">
                    <input type="checkbox" id="hereCheckbox" class="custom-checkbox">
                    <span class="text-xl font-bold text-slate-200 group-hover:text-white transition-colors">I'm here</span>
                </label>

                <!-- Error Message -->
                <div id="error-banner" class="hidden bg-rose-500/10 border border-rose-500/20 p-4 rounded-2xl fade-in">
                    <div class="flex gap-3">
                        <i class="fa-solid fa-circle-exclamation text-rose-500 mt-0.5"></i>
                        <p id="error-text" class="text-sm text-rose-200 font-medium"></p>
                    </div>
                </div>

                <!-- Submit Button -->
                <button
                    id="checkin-btn"
                    class="w-full py-5 px-6 rounded-2xl font-black text-xl text-white shadow-lg shadow-blue-500/20 transform transition-all active:scale-95 flex items-center justify-center gap-3 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed uppercase tracking-wider mt-2"
                >
                    CHECK-IN
                </button>
            </div>

            <!-- Success View -->
            <div id="success-view" class="hidden text-center py-8 fade-in">
                <div class="mb-6">
                    <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                        <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
                        <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                    </svg>
                </div>
                <h2 class="text-2xl font-extrabold text-white mb-2">Check-in Successful!</h2>
                <p class="text-slate-400 text-sm">Have a great day at work.</p>
            </div>
        </div>
    </div>

    <script>
        const OFFICE_IP = "14.232.210.67";
        const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbzp55iIP10jDPRw0BHhXNcDeAV13x6zegspma2i453ylQiywOqp-XNzgnkHUadTRftV/exec";
        const IP_API = "https://api.ipify.org?format=json";
        const COOLDOWN_HOURS = 12;

        let currentIp = null;

        // DOM Elements
        const timeDisplay = document.getElementById('current-time');
        const dateDisplay = document.getElementById('current-date');
        const ipStatusBanner = document.getElementById('ip-status-banner');
        const ipIndicator = document.getElementById('ip-indicator');
        const ipText = document.getElementById('ip-text');
        
        const formView = document.getElementById('form-view');
        const cooldownView = document.getElementById('cooldown-view');
        const successView = document.getElementById('success-view');
        const cooldownTimer = document.getElementById('cooldown-timer');
        
        const nameSelect = document.getElementById('nameSelect');
        const hereCheckbox = document.getElementById('hereCheckbox');
        const checkinBtn = document.getElementById('checkin-btn');
        const errorBanner = document.getElementById('error-banner');
        const errorText = document.getElementById('error-text');

        // Clock
        function updateClock() {
            const now = new Date();
            timeDisplay.textContent = now.toLocaleTimeString('en-US', { hour12: false });
            dateDisplay.textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Cooldown Logic
        function checkCooldown() {
            const lastCheckIn = localStorage.getItem('oac_last_checkin');
            if (lastCheckIn) {
                const lastTime = new Date(parseInt(lastCheckIn));
                const now = new Date();
                const diffHours = (now - lastTime) / (1000 * 60 * 60);
                
                if (diffHours < COOLDOWN_HOURS) {
                    formView.classList.add('hidden');
                    cooldownView.classList.remove('hidden');
                    
                    // Optional: show remaining time
                    const updateTimer = () => {
                        const currentNow = new Date();
                        const remainingMs = (COOLDOWN_HOURS * 60 * 60 * 1000) - (currentNow - lastTime);
                        if (remainingMs <= 0) {
                            localStorage.removeItem('oac_last_checkin');
                            location.reload();
                            return;
                        }
                        const remainingHours = Math.floor(remainingMs / (1000 * 60 * 60));
                        const remainingMins = Math.floor((remainingMs % (1000 * 60 * 60)) / (1000 * 60));
                        cooldownTimer.textContent = `Time remaining: ${remainingHours}h ${remainingMins}m`;
                    };
                    updateTimer();
                    setInterval(updateTimer, 60000); // Update every minute
                    return true;
                } else {
                    localStorage.removeItem('oac_last_checkin');
                }
            }
            return false;
        }

        // IP Check
        async function fetchIp() {
            try {
                const res = await fetch(IP_API);
                const data = await res.json();
                currentIp = data.ip;
                
                ipIndicator.classList.remove('animate-pulse', 'bg-slate-500');
                if (currentIp === OFFICE_IP) {
                    ipIndicator.classList.add('bg-green-500');
                    ipStatusBanner.classList.add('border-green-500/20', 'bg-green-500/5');
                    ipText.innerHTML = `Connected to OAC Wifi <span class="text-slate-500 font-normal">(${currentIp})</span>`;
                    ipText.classList.replace('text-slate-400', 'text-green-400');
                } else {
                    ipIndicator.classList.add('bg-amber-500');
                    ipStatusBanner.classList.add('border-amber-500/20', 'bg-amber-500/5');
                    ipText.innerHTML = `Restricted Network <span class="text-slate-500 font-normal">(${currentIp})</span>`;
                    ipText.classList.replace('text-slate-400', 'text-amber-400');
                }
            } catch (err) {
                console.error("IP detection failed:", err);
                ipText.textContent = "Unable to verify network";
                ipIndicator.className = "w-2 h-2 rounded-full bg-rose-500";
            }
        }

        // Check-in Action
        checkinBtn.addEventListener('click', async () => {
            const name = nameSelect.value;
            const isHere = hereCheckbox.checked;

            if (!name) {
                showError("Please select your name.");
                return;
            }

            if (!isHere) {
                showError("Please check the 'I'm here' box.");
                return;
            }

            if (!currentIp) {
                showError("Verifying network, please wait...");
                return;
            }

            if (currentIp !== OFFICE_IP) {
                showError("You must be connected to the OAC Office Wifi to check in.");
                return;
            }

            hideError();
            setLoading(true);

            try {
                const payload = {
                    name: name,
                    status: "I'm here"
                };

                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Set cooldown
                localStorage.setItem('oac_last_checkin', Date.now().toString());

                // Show success
                formView.classList.add('hidden');
                successView.classList.remove('hidden');
            } catch (err) {
                console.error("Submission failed:", err);
                showError("Failed to submit check-in. Please try again.");
                setLoading(false);
            }
        });

        // UI Helpers
        function showError(msg) {
            errorText.textContent = msg;
            errorBanner.classList.remove('hidden');
        }

        function hideError() {
            errorBanner.classList.add('hidden');
        }

        function setLoading(isLoading) {
            if (isLoading) {
                checkinBtn.disabled = true;
                checkinBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            } else {
                checkinBtn.disabled = false;
                checkinBtn.textContent = 'CHECK-IN';
            }
        }

        // Init
        if (!checkCooldown()) {
            fetchIp();
        } else {
            // Still fetch IP to show status, but form is hidden
            fetchIp();
        }
    </script>
</body>
</html>
